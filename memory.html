<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match Game | Memory Enhancement</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    
    .logo h1 {
      margin: 8px;
      text-align: right;
      font-family: 'Segoe UI', sans-serif;
      font-size: 1.8rem;
    }
    nav ul {
   text-align: right;
    display: flex;
  
    gap: 1.5rem;
    margin: 0;
    padding: 0;
    
}
  nav ul li a {
    color: white;
    
    text-align: right;
    font-family: 'Segoe UI', sans-serif;
    font-size: 1.2rem;
    padding: 12px 20px;
}

    .container {
      max-width: 800px;
      margin: 20px auto;
      text-align: center;
    }
    body{
      background: linear-gradient(160deg, #02ccba 0%, #aa7ecd 100%);
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 150px);
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
      padding: 20px;
      border-radius: 15px;
      background: linear-gradient(160deg, #fc6262 0%, #59f7f7 100%);
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    }

    .card {
      width: 150px;
      height: 150px;
      background-color: #280dc4;
      color: white;
      font-size: 2em;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      border-radius: 8px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card.flipped {
      background-color: #fff;
      color: #1e90ff;
      cursor: default;
      transform: rotateY(180deg);
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">
      <h1><i class="fas fa-brain"></i> Memory Boost</h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a class="active" href="memory.html" >Memory</a></li>
        <li><a href="music.html">Music</a></li>
        <li><a href="math.html">Math</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <div class="container">
      <h2>Memory Match Game</h2>
      <button id="restart">Restart</button>
      <div class="game-board" id="game-board"></div>
      <p>Moves: <span id="move-count">0</span></p>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 Memory Enhancement. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
  <script>
    // Memory game JavaScript remains the same
    const gameBoard = document.getElementById('game-board');
    const moveCountElem = document.getElementById('move-count');
    const restartButton = document.getElementById('restart');

    const icons = ['🍎', '🍌', '🍇', '🍓', '🍍', '🥝', '🍒', '🍑'];
    let cards = [...icons, ...icons];
    let flippedCards = [];
    let matchedCards = [];
    let moves = 0;

    function shuffle(array) {
      return array.sort(() => 0.5 - Math.random());
    }

    function createBoard() {
      gameBoard.innerHTML = '';
      cards = shuffle(cards);
      cards.forEach((icon, index) => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.icon = icon;
        card.dataset.index = index;
        card.addEventListener('click', flipCard);
        gameBoard.appendChild(card);
      });
      moves = 0;
      moveCountElem.textContent = moves;
      flippedCards = [];
      matchedCards = [];
    }

    function flipCard() {
      if (flippedCards.length === 2 || this.classList.contains('flipped')) return;

      this.classList.add('flipped');
      this.textContent = this.dataset.icon;
      flippedCards.push(this);

      if (flippedCards.length === 2) {
        moves++;
        moveCountElem.textContent = moves;
        checkForMatch();
      }
    }

    function checkForMatch() {
      const [card1, card2] = flippedCards;
      if (card1.dataset.icon === card2.dataset.icon) {
        matchedCards.push(card1, card2);
        flippedCards = [];
        if (matchedCards.length === cards.length) {
          setTimeout(() => alert(`Congratulations! You won in ${moves} moves.`), 500);
        }
      } else {
        setTimeout(() => {
          card1.classList.remove('flipped');
          card2.classList.remove('flipped');
          card1.textContent = '';
          card2.textContent = '';
          flippedCards = [];
        }, 1000);
      }
    }

    restartButton.addEventListener('click', createBoard);
    createBoard();
  </script>
</body>

</html>
